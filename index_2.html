    #splash .tx{color:#F97316;font-size:16px;font-weight:700;letter-spacing:5px;font-family:'Prompt',sans-serif}

    #err.show{display:flex}
    #err h2{color:#EF4444;font-size:18px;font-family:'Prompt',sans-serif}
    #err p{color:#71717A;font-size:13px;font-family:'Sarabun',sans-serif;max-width:300px;line-height:1.6}
    #err code{color:#F97316;font-size:11px;font-family:monospace;background:#18181B;padding:8px 12px;border-radius:8px;max-width:320px;overflow:auto;display:block;text-align:left}
