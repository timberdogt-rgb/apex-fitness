const nowISO = () => new Date().toISOString();
const timeAgo = iso => {
  const diff=Math.floor((Date.now()-new Date(iso).getTime())/1000);
  if(diff<60) return "เมื่อสักครู่";
  if(diff<3600) return `${Math.floor(diff/60)} นาทีที่แล้ว`;
  if(diff<86400) return `${Math.floor(diff/3600)} ชม.ที่แล้ว`;
  return `${Math.floor(diff/86400)} วันที่แล้ว`;
};

const memberStatus = m => {
  if(!m) return "none";
  if(m.suspended) return "suspended";
  if(m.membershipType==="monthly"){ if(!m.membershipExpiry) return "no_membership"; return new Date(m.membershipExpiry)>=new Date(fmt(TODAY))?"active":"expired"; }
  if(m.membershipType==="per_session") return (m.sessionsLeft||0)>0?"active":"no_credits";
  return "no_membership";
};

const buildSessions = (classes) => {
  const map={};
  for(let d=0;d<14;d++){
    const date=shift(TODAY,d), ds=fmt(date), dow=date.getDay();
    classes.filter(c=>c.active&&c.days.includes(dow)).forEach(c=>{
      const sid=`${c.id}_${ds}`;
      let bk=[], wl=[];
      if(d===0){ if(c.id==="c3") bk=["M001","M002","M004"]; if(c.id==="c4"){ bk=["M001","M002","M004"]; wl=["M005"]; } if(c.id==="c1") bk=["M004"]; }
      if(d===1&&c.id==="c2") bk=["M001","M004"];
      map[sid]={id:sid,cid:c.id,name:c.name,ins:c.ins,date:ds,t:c.t,dur:c.dur,cap:c.cap,wlCap:c.wl,col:c.col,dim:c.dim,ico:c.ico,bk:[...new Set(bk)],wl:[...new Set(wl)],att:{}};
    });
  }
  return map;
};

// ── LOGIN ──
function LoginScreen({onLogin,deviceId,members}) {
  const [phone,setPhone]=useState(""),[pin,setPin]=useState(""),[err,setErr]=useState(""),[loading,setLoading]=useState(false);
  const doLogin = async () => {
    setErr(""); setLoading(true);
    await new Promise(r=>setTimeout(r,350));
    const clean=phone.replace(/\D/g,"");
    if(phone==="admin"){ if(pin==="apex2024"){ onLogin({type:"admin"}); return; } setErr("รหัสผ่าน Admin ไม่ถูกต้อง"); setLoading(false); return; }
    const m=members.find(x=>x.phone===clean);
    if(!m){ setErr("ไม่พบเบอร์โทรนี้ — กรุณาติดต่อ Admin"); setLoading(false); return; }
    if(m.pin!==pin){ setErr("รหัส PIN ไม่ถูกต้อง"); setLoading(false); return; }
    if(m.deviceId && m.deviceId!==deviceId){ setErr("⚠️ เบอร์นี้ถูกล็อกกับอุปกรณ์อื่น — แจ้ง Admin เพื่อปลดล็อก"); setLoading(false); return; }
    onLogin({type:"user",mid:m.id});
  };
  const fill=(p,pi)=>{ setPhone(p); setPin(pi); setErr(""); };
  return (
    <div style={{minHeight:"100vh",background:C.bg,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:20,fontFamily:FONT}}>
      <div style={{textAlign:"center",marginBottom:30}}>
        <div style={{fontSize:56,marginBottom:8,filter:"drop-shadow(0 0 24px rgba(249,115,22,.5))"}}>🏋️</div>
        <div style={{fontSize:32,fontWeight:900,color:C.text,letterSpacing:5,lineHeight:1}}>APEX</div>
        <div style={{fontSize:11,color:C.orange,letterSpacing:7,marginTop:3,fontWeight:700}}>FITNESS</div>
        <div style={{fontSize:11,color:C.muted,letterSpacing:2,marginTop:8}}>ระบบจองคลาสออนไลน์</div>
      </div>
      <div style={{width:"100%",maxWidth:400}}>
        <div style={{background:C.surf,borderRadius:16,border:`1px solid ${C.border}`,padding:28,marginBottom:14}}>
          {[["เบอร์โทรศัพท์",phone,setPhone,"tel","0812345678",undefined],["รหัส PIN (4 หลัก)",pin,setPin,"password","••••",4]].map(([lb,val,set,tp,ph,ml])=>(
            <div key={lb} style={{marginBottom:16}}>
              <div style={{color:C.muted,fontSize:12,fontWeight:600,marginBottom:6}}>{lb}</div>
              <input value={val} onChange={e=>{set(e.target.value);setErr("");}} type={tp} placeholder={ph} maxLength={ml} onKeyDown={e=>e.key==="Enter"&&doLogin()}
                style={{width:"100%",padding:"13px 14px",background:C.bg,border:`1px solid ${err?C.red:C.border}`,borderRadius:10,color:C.text,fontSize:15,boxSizing:"border-box",outline:"none",fontFamily:FONT,letterSpacing:tp==="password"?6:undefined}}/>
            </div>
          ))}
          {err&&<div style={{color:C.red,fontSize:12,marginBottom:10,padding:"9px 12px",background:C.rM,borderRadius:8,lineHeight:1.5}}>⚠️ {err}</div>}

// ── USER: SCHEDULE ──
function ScheduleView({sessions,member,settings,onBook,onWaitlist,onCancel,onCancelWL}) {

  const list=useMemo(()=>Object.values(sessions).filter(s=>s.date===ds).sort((a,b)=>a.t.localeCompare(b.t)),[sessions,ds]);
  const st=memberStatus(member);
  const canBook = st==="active";
  return (
    <div>
      {st!=="active"&&st!=="suspended"&&(
        <div style={{background:C.rM,border:"1px solid rgba(239,68,68,.3)",borderRadius:12,padding:"12px 16px",marginBottom:14}}>
          <div style={{color:C.red,fontWeight:700,fontSize:13}}>{st==="expired"?"⏰ สมาชิกภาพหมดอายุ":st==="no_credits"?"💳 เครดิตหมด":"❌ ไม่มีสมาชิกภาพ"}</div>
          <div style={{color:C.muted,fontSize:12,marginTop:3}}>ต่ออายุ/ติดต่อ: 📞 {settings.contactPhone} · LINE {settings.contactLine}</div>

      <DayStrip sel={day} set={setDay} sessions={sessions}/>
      <div style={{color:C.muted,fontSize:12,marginBottom:10}}>{DF[shift(TODAY,day).getDay()]} {shift(TODAY,day).getDate()} {MO[shift(TODAY,day).getMonth()]}<span style={{color:C.border}}> · </span><span style={{color:C.sub}}>{list.length} คลาส</span></div>

        return (
          <div key={s.id} onClick={()=>setExp(open?null:s.id)} style={{marginBottom:10,borderRadius:16,overflow:"hidden",background:C.surf,border:`1px solid ${bk?s.col:inWL?C.amber:C.border}`,cursor:"pointer"}}>
            <div style={{height:3,background:s.col}}/>
            <div style={{padding:"13px 14px"}}>
              <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:8}}>
                <div style={{display:"flex",gap:10,alignItems:"flex-start"}}>
                  <div style={{width:44,height:44,borderRadius:10,background:s.dim,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0}}>{s.ico}</div>
                  <div>
                    <div style={{color:C.text,fontWeight:700,fontSize:14,lineHeight:1.2}}>{s.name}{s.wlCap>=10&&<span style={{marginLeft:6,fontSize:10,color:C.amber}}>🔥</span>}</div>
                    <div style={{color:C.muted,fontSize:12,marginTop:2}}>{s.ins}</div>

                :<Btn label="จองคลาสนี้ →" bg={s.col} onClick={e=>{e.stopPropagation();canBook?setModal({kind:"book",sid:s.id,name:s.name,col:s.col,ico:s.ico}):setModal({kind:"membership"});}} full disabled={member.suspended}/>}

          <div style={{fontSize:52,marginBottom:8}}>{modal.ico}</div>

          <div style={{color:modal.col,fontWeight:700,marginBottom:16}}>{modal.name}</div>
          {member.membershipType==="per_session"&&<div style={{background:C.aM,border:`1px solid ${C.amber}`,borderRadius:10,padding:"10px 14px",marginBottom:14,color:C.amber,fontSize:13}}>🎟️ ใช้ 1 เครดิต (เหลือ {(member.sessionsLeft||0)-1} ครั้ง)</div>}
          <div style={{background:C.bg,borderRadius:10,padding:"10px 14px",marginBottom:20,fontSize:12,color:C.muted,lineHeight:1.7}}>📌 1 คน 1 สิทธิ์ต่อคลาส<br/>⏰ เช็คอินก่อน {settings.checkinBeforeMin} นาที สายไม่เกิน {settings.checkinAfterMin} นาที</div>
          <div style={{display:"flex",gap:10}}><Btn label="ยกเลิก" bg={C.surf} col={C.muted} onClick={()=>setModal(null)} full/><Btn label="✓ ยืนยันจอง" bg={modal.col} onClick={()=>{onBook(modal.sid);setModal(null);}} full/></div>
        </div>}
        {modal.kind==="waitlist"&&<div style={{textAlign:"center"}}>
          <div style={{fontSize:52,marginBottom:8}}>🪑</div>
          <div style={{color:C.text,fontWeight:800,fontSize:18,marginBottom:4}}>จองที่นั่งสำรอง</div>
          <div style={{color:C.amber,fontWeight:700,marginBottom:8}}>{modal.name}</div>
          <div style={{background:C.aM,border:`1px solid ${C.amber}`,borderRadius:10,padding:14,marginBottom:16,fontSize:13,color:C.amber,lineHeight:1.6}}>ลำดับที่ <strong style={{fontSize:20}}>{modal.pos}</strong> ในรายการสำรอง<br/>เมื่อมีคนยกเลิก ระบบจะแจ้งเตือนและเลื่อนที่นั่งให้อัตโนมัติ</div>

        </div>}
        {modal.kind==="cancelMain"&&<div style={{textAlign:"center"}}>

        </div>
      ))}
    </div>
  );
}

  return (
    <div>
      <DayStrip sel={day} set={setDay} sessions={sessions}/>
      {list.length===0?<div style={{textAlign:"center",padding:"40px 0",color:C.muted}}>ไม่มีคลาสวันนี้</div>

        <div key={s.id} style={{background:C.surf,borderRadius:16,border:`1px solid ${C.border}`,marginBottom:14,overflow:"hidden"}}>

            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}><div><div style={{color:C.text,fontWeight:700,fontSize:14}}>{s.ico} {s.name}</div><div style={{color:C.muted,fontSize:12}}>{s.t} · {s.ins} · หลัก {s.bk.length}/{s.cap}</div></div><Pill text={`${s.bk.length}/${s.cap}`} color={s.col} bg={`${s.col}18`}/></div>
            {s.bk.length===0&&s.wl.length===0&&<div style={{color:C.muted,fontSize:13,textAlign:"center",padding:"8px 0"}}>ยังไม่มีการจอง</div>}
            {s.bk.map(mid=>{ const m=members.find(x=>x.id===mid); if(!m) return null; const att=s.att[mid]; return (
              <div key={mid} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"9px 0",borderBottom:`1px solid ${C.border}`}}>
                <div style={{display:"flex",alignItems:"center",gap:10}}><div style={{width:34,height:34,borderRadius:"50%",background:att==="present"?C.gM:att==="noshow"?C.rM:C.surfUp,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14}}>{att==="present"?"✅":att==="noshow"?"❌":"👤"}</div><div><div style={{color:C.text,fontSize:13,fontWeight:600}}>{m.name}</div><div style={{color:C.muted,fontSize:11}}>{m.phone}</div></div></div>
                <div style={{display:"flex",gap:5}}><button onClick={()=>onMark(s.id,mid,"present")} style={{padding:"6px 10px",borderRadius:7,fontSize:11,fontWeight:700,cursor:"pointer",background:att==="present"?C.green:C.gM,border:`1px solid ${att==="present"?C.green:"rgba(34,197,94,.3)"}`,color:att==="present"?"#fff":C.green,fontFamily:FONT}}>✓ มา</button><button onClick={()=>onMark(s.id,mid,"noshow")} style={{padding:"6px 10px",borderRadius:7,fontSize:11,fontWeight:700,cursor:"pointer",background:att==="noshow"?C.red:C.rM,border:`1px solid ${att==="noshow"?C.red:"rgba(239,68,68,.3)"}`,color:att==="noshow"?"#fff":C.red,fontFamily:FONT}}>✗ ไม่มา</button></div>
              </div>
            );})}
            {s.wl.length>0&&<div style={{marginTop:10}}>
              <div style={{color:C.amber,fontSize:11,fontWeight:700,marginBottom:8}}>🪑 ที่นั่งสำรอง ({s.wl.length}/{s.wlCap})</div>
              {s.wl.map((mid,idx)=>{ const m=members.find(x=>x.id===mid); if(!m) return null; const canP=s.bk.length<s.cap; return (
                <div key={mid} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"7px 0",borderBottom:`1px solid ${C.border}`}}>
                  <div style={{display:"flex",alignItems:"center",gap:8}}><div style={{width:22,height:22,borderRadius:"50%",background:C.aM,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,color:C.amber,fontWeight:700}}>{idx+1}</div><div><div style={{color:C.sub,fontSize:13}}>{m.name}</div><div style={{color:C.muted,fontSize:11}}>{m.phone}</div></div></div>
                  {canP&&<button onClick={()=>onPromoteWL(s.id,mid)} style={{padding:"5px 10px",borderRadius:7,fontSize:11,fontWeight:700,cursor:"pointer",background:C.gM,border:`1px solid rgba(34,197,94,.3)`,color:C.green,fontFamily:FONT}}>โปรโมต ↑</button>}
                </div>
              );})}
            </div>}
          </div>
        </div>
      ))}
    </div>
  );
}

        {form.membershipType==="per_session"&&<Field lb="จำนวนเครดิต (ครั้ง)"><Inp fk="sessionsLeft" tp="number" pl="10"/></Field>}
        {modal.kind==="edit"&&<Field lb="No-show Count"><div style={{display:"flex",gap:8}}><Inp fk="noShowCount" tp="number" pl="0"/><Btn label="รีเซ็ต" bg={C.gM} col={C.green} onClick={()=>setForm(p=>({...p,noShowCount:0,suspended:false,suspendedUntil:null}))} size="sm"/></div></Field>}
        {modal.kind==="edit"&&form.suspended&&<div style={{background:C.rM,borderRadius:10,padding:12,marginBottom:14}}><div style={{color:C.red,fontSize:13,fontWeight:700,marginBottom:6}}>🚫 ถูกระงับ ถึง {thFmt(form.suspendedUntil)}</div><Btn label="ปลดระงับ" bg={C.gM} col={C.green} onClick={()=>setForm(p=>({...p,suspended:false,suspendedUntil:null,noShowCount:0}))} full/></div>}
        <div style={{display:"flex",gap:10,marginTop:8}}><Btn label="ยกเลิก" bg={C.surf} col={C.muted} onClick={()=>setModal(null)} full/><Btn label="✓ บันทึก" bg={C.orange} onClick={()=>{ if(!form.name||!form.phone){showToast("กรอกชื่อและเบอร์","err");return;} onSaveMember({...form,sessionsLeft:form.sessionsLeft!==null&&form.sessionsLeft!==""?parseInt(form.sessionsLeft)||0:null,noShowCount:parseInt(form.noShowCount)||0}); setModal(null); }} full/></div>
      </Overlay>}
    </div>
  );
}

        <div onClick={()=>showToast("💬 LINE Notify (ใส่ Token จริงก่อน)","line")} style={{background:C.lineM,border:`1px solid ${C.line}`,borderRadius:14,padding:18,cursor:"pointer",textAlign:"center"}}><div style={{fontSize:30,marginBottom:8}}>💬</div><div style={{color:C.line,fontWeight:700,fontSize:13}}>LINE Notify</div><div style={{color:C.muted,fontSize:11,marginTop:2}}>ส่งสรุปคลาส</div></div>

// ── ROOT APP ──
function App() {
  const [loading,setLoading]=useState(true);
  const [deviceId,setDeviceId]=useState(null);
  const [auth,setAuth]=useState(null);
  const [members,setMembers]=useState([]);
  const [sessions,setSessions]=useState({});
  const [classes,setClasses]=useState(CLASSES);
  const [settings,setSettings]=useState(DEFAULT_SETTINGS);
  const [notifications,setNotifications]=useState([]);
  const [view,setView]=useState("schedule");
  const [toast,setToast]=useState(null);
  const showToast=useCallback((msg,ty="ok")=>{ setToast({msg,ty}); setTimeout(()=>setToast(null),3500); },[]);

  useEffect(()=>{ (async()=>{
    try {
      let did=await store.get("apex_device_id");
      if(!did){ did="dev_"+uid(); await store.set("apex_device_id",did); }
      setDeviceId(did);
      const sm=await store.get("apex_members"),ss=await store.get("apex_sessions"),sc=await store.get("apex_settings"),scl=await store.get("apex_classes"),sn=await store.get("apex_notifs");
      const m=sm||INIT_MEMBERS,se=ss||buildSessions(CLASSES),st=sc||DEFAULT_SETTINGS,cl=scl||CLASSES,nt=sn||[];
      setMembers(m); setSessions(se); setSettings(st); setClasses(cl); setNotifications(nt);
      if(!sm) await store.set("apex_members",m);
      if(!ss) await store.set("apex_sessions",se);
      if(!sc) await store.set("apex_settings",st);
      if(!scl) await store.set("apex_classes",cl);
    } catch { setMembers(INIT_MEMBERS); setSessions(buildSessions(CLASSES)); setSettings(DEFAULT_SETTINGS); setClasses(CLASSES); }
    setLoading(false);
  })(); },[]);

  const save=useCallback(async(k,v)=>{ try{ await store.set(k,v); }catch{} },[]);
  const pushNotif=useCallback((mid,type,title,body)=>{
    setNotifications(prev=>{ const nn=[...prev,{id:uid(),mid,type,title,body,ts:nowISO(),read:false}]; save("apex_notifs",nn); return nn; });
  },[save]);

  const book=useCallback((sid)=>{
    const m=members.find(x=>x.id===auth?.mid); if(!m) return;
    const s=sessions[sid]; if(!s) return;
    if(s.bk.includes(m.id)){ showToast("จองแล้ว","warn"); return; }
    if(s.bk.length>=s.cap){ showToast("ที่นั่งหลักเต็ม","warn"); return; }
    const ns={...sessions,[sid]:{...s,bk:[...s.bk,m.id]}};
    if(m.membershipType==="per_session"){ const nm=members.map(x=>x.id===m.id?{...x,sessionsLeft:Math.max(0,(x.sessionsLeft||0)-1)}:x); setMembers(nm); save("apex_members",nm); }
    setSessions(ns); save("apex_sessions",ns); showToast(`✅ จอง ${s.name} สำเร็จ!`,"ok");
  },[auth,members,sessions,showToast,save]);

  const joinWL=useCallback((sid)=>{
    const m=members.find(x=>x.id===auth?.mid); if(!m) return;
    const s=sessions[sid]; if(!s) return;
    if(s.wl.includes(m.id)){ showToast("อยู่ในรายการสำรองแล้ว","warn"); return; }
    if(s.wl.length>=s.wlCap){ showToast("สำรองเต็ม","warn"); return; }
    const ns={...sessions,[sid]:{...s,wl:[...s.wl,m.id]}};
    setSessions(ns); save("apex_sessions",ns);
    pushNotif(m.id,"info","เข้ารายการสำรองแล้ว",`คุณอยู่ลำดับ ${s.wl.length+1} ของ ${s.name} (${thFmt(s.date)} ${s.t}) — จะแจ้งเมื่อได้ที่นั่ง`);
    showToast(`🪑 อยู่ในรายการสำรองลำดับ ${s.wl.length+1}`,"ok");
  },[auth,members,sessions,showToast,save,pushNotif]);

  const cancel=useCallback((sid)=>{
    const mid=auth?.mid; const s=sessions[sid]; if(!s) return;
    let newBk=s.bk.filter(x=>x!==mid), newWl=[...s.wl], promoted=null;
    if(newWl.length>0 && newBk.length<s.cap){ promoted=newWl.shift(); newBk=[...newBk,promoted]; }
    const ns={...sessions,[sid]:{...s,bk:newBk,wl:newWl}};
    setSessions(ns); save("apex_sessions",ns);
    if(promoted){
      pushNotif(promoted,"promoted","🎉 คุณได้ที่นั่งแล้ว!",`มีที่ว่างใน ${s.name} (${thFmt(s.date)} ${s.t}) — คุณถูกเลื่อนจากสำรองเป็นการจองหลักแล้ว`);
      const pm=members.find(x=>x.id===promoted);
      showToast(`✅ ยกเลิกแล้ว — ${pm?.name||""} ได้ที่นั่งจากสำรอง (ส่ง LINE แล้ว)`,"line");
    } else showToast("ยกเลิกการจองแล้ว","warn");
  },[auth,sessions,members,showToast,save,pushNotif]);

  const cancelWL=useCallback((sid)=>{
    const mid=auth?.mid; const s=sessions[sid]; if(!s) return;
    const ns={...sessions,[sid]:{...s,wl:s.wl.filter(x=>x!==mid)}};
    setSessions(ns); save("apex_sessions",ns); showToast("ออกจากรายการสำรองแล้ว","warn");
  },[auth,sessions,showToast,save]);

  const checkin=useCallback((sid)=>{
    const mid=auth?.mid; const s=sessions[sid]; if(!s||!mid) return;
    if(s.att[mid]==="present"){ showToast("เช็คอินแล้ว ✅","warn"); return; }
    const ns={...sessions,[sid]:{...s,att:{...s.att,[mid]:"present"}}};
    setSessions(ns); save("apex_sessions",ns); showToast(`🎉 เช็คอินสำเร็จ! สนุกกับ ${s.name}`,"ok");
  },[auth,sessions,showToast,save]);

  const markAtt=useCallback((sid,mid,status)=>{
    setSessions(prev=>{
      if(prev[sid]?.att[mid]===status) return prev;
      const ns={...prev,[sid]:{...prev[sid],att:{...prev[sid].att,[mid]:status}}};
      save("apex_sessions",ns);
      if(status==="noshow"){
        setMembers(pm=>{ const nm=pm.map(m=>{ if(m.id!==mid) return m; const n=(m.noShowCount||0)+1;
          if(n>=settings.noShowLimit&&!m.suspended){ showToast(`🚫 ${m.name} ถูกระงับ ${settings.suspensionDays} วัน`,"warn"); pushNotif(mid,"suspended","🚫 บัญชีถูกระงับ",`คุณ no-show ครบ ${settings.noShowLimit} ครั้ง ระบบระงับการจอง ${settings.suspensionDays} วัน`); return {...m,noShowCount:n,suspended:true,suspendedUntil:fmt(shift(TODAY,settings.suspensionDays))}; }
          if(!m.suspended){ showToast(`⚠️ ${m.name} no-show ครั้งที่ ${n}`,"warn"); pushNotif(mid,"info","⚠️ บันทึก No-show",`คุณไม่ได้เช็คอิน (ครั้งที่ ${n}/${settings.noShowLimit})`); }
          return {...m,noShowCount:n}; }); save("apex_members",nm); return nm; });
      }
      return ns;
    });
  },[settings,showToast,save,pushNotif]);

  const promoteWL=useCallback((sid,mid)=>{
    const s=sessions[sid]; if(!s) return;
    if(s.bk.length>=s.cap){ showToast("ที่นั่งหลักยังเต็ม","err"); return; }
    const ns={...sessions,[sid]:{...s,bk:[...s.bk,mid],wl:s.wl.filter(x=>x!==mid)}};
    setSessions(ns); save("apex_sessions",ns);
    pushNotif(mid,"promoted","🎉 คุณได้ที่นั่งแล้ว!",`Admin เลื่อนคุณจากสำรองเป็นการจองหลักของ ${s.name} (${thFmt(s.date)} ${s.t})`);
    const m=members.find(x=>x.id===mid); showToast(`✅ โปรโมต ${m?.name} สำเร็จ (ส่ง LINE แล้ว)`,"line");
  },[sessions,members,showToast,save,pushNotif]);

  const saveMember=useCallback((newM)=>{
    const nm=members.some(m=>m.id===newM.id)?members.map(m=>m.id===newM.id?newM:m):[...members,newM];
    setMembers(nm); save("apex_members",nm); showToast(`บันทึก ${newM.name} แล้ว ✓`,"ok");
  },[members,save,showToast]);

  const unlockDevice=useCallback((mid)=>{
    const nm=members.map(m=>m.id===mid?{...m,deviceId:null}:m);
    setMembers(nm); save("apex_members",nm); showToast("🔓 ปลดอุปกรณ์แล้ว ✓","ok");
  },[members,save,showToast]);

  const saveSettings=useCallback((ns)=>{ setSettings(ns); save("apex_settings",ns); },[save]);
  const markNotifRead=useCallback((id)=>{ setNotifications(prev=>{ const nn=prev.map(n=>n.id===id?{...n,read:true}:n); save("apex_notifs",nn); return nn; }); },[save]);

  const login=useCallback(async(a)=>{
    if(a.type==="admin"){ setAuth(a); setView("overview"); return; }
    const m=members.find(x=>x.id===a.mid);
    if(m&&!m.deviceId){ const nm=members.map(x=>x.id===a.mid?{...x,deviceId}:x); setMembers(nm); save("apex_members",nm); }
    setAuth(a); setView("schedule");
  },[members,deviceId,save]);

  const logout=useCallback(()=>{ setAuth(null); setView("schedule"); },[]);
  const cur=useMemo(()=>auth?.mid?members.find(m=>m.id===auth.mid):null,[auth,members]);
  const isAdmin=auth?.type==="admin";
  const unreadCount=useMemo(()=>cur?(notifications||[]).filter(n=>n.mid===cur.id&&!n.read).length:0,[notifications,cur]);

  if(loading) return <div style={{minHeight:"100vh",background:C.bg,display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:16,fontFamily:FONT}}><div style={{fontSize:48}}>🏋️</div><div style={{color:C.orange,fontSize:16,fontWeight:700}}>APEX FITNESS</div><div style={{color:C.muted,fontSize:13}}>กำลังโหลด...</div></div>;
  if(!auth) return <LoginScreen onLogin={login} deviceId={deviceId} members={members}/>;

  const USER_NAV=[{id:"schedule",ic:"📅",lb:"ตารางคลาส"},{id:"myBookings",ic:"🎫",lb:"การจอง"},{id:"checkin",ic:"📲",lb:"เช็คอิน"},{id:"notifs",ic:"🔔",lb:"แจ้งเตือน",badge:unreadCount},{id:"profile",ic:"👤",lb:"โปรไฟล์"}];
  const ADMIN_NAV=[{id:"overview",ic:"📊",lb:"ภาพรวม"},{id:"attend",ic:"✅",lb:"เข้าร่วม"},{id:"members",ic:"👥",lb:"สมาชิก"},{id:"notiflog",ic:"💬",lb:"LINE Log"},{id:"reports",ic:"📋",lb:"รายงาน"},{id:"settings",ic:"⚙️",lb:"ตั้งค่า"}];
  const NAV=isAdmin?ADMIN_NAV:USER_NAV;
  const TITLE={schedule:"ตารางคลาส",myBookings:"การจองของฉัน",checkin:"เช็คอิน",notifs:"การแจ้งเตือน",profile:"โปรไฟล์",overview:"Admin Dashboard",attend:"บันทึกเข้าร่วม",members:"สมาชิก",notiflog:"LINE Notify Log",reports:"รายงาน",settings:"ตั้งค่าระบบ"};

  return (
    <div style={{minHeight:"100vh",background:C.bg,maxWidth:440,margin:"0 auto",fontFamily:FONT,position:"relative"}}>
      <Toast t={toast}/>
      <div style={{padding:"14px 16px",display:"flex",justifyContent:"space-between",alignItems:"center",position:"sticky",top:0,background:C.bg,zIndex:50,borderBottom:`1px solid ${C.border}`}}>
        <div><div style={{fontSize:9,color:C.orange,fontWeight:800,letterSpacing:4,marginBottom:1}}>APEX FITNESS</div><div style={{fontSize:18,fontWeight:900,color:C.text,lineHeight:1.1}}>{TITLE[view]}</div></div>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          {!isAdmin&&cur&&<StatusBadge member={cur}/>}
          {isAdmin&&<div style={{fontSize:12,color:C.orange,fontWeight:800}}>👑 Admin</div>}
          {!isAdmin&&cur&&<div style={{fontSize:11,textAlign:"right",color:C.sub}}><div style={{fontWeight:700}}>{cur.name.split(" ")[0]}</div><div style={{color:C.muted,fontSize:10}}>{cur.membershipType==="per_session"?`🎟️ ${cur.sessionsLeft||0}ครั้ง`:cur.membershipType==="monthly"?"📅 Monthly":""}</div></div>}
          <button onClick={logout} style={{background:C.surf,border:`1px solid ${C.border}`,borderRadius:9,padding:"5px 10px",color:C.muted,fontSize:12,cursor:"pointer",fontFamily:FONT}}>ออก</button>
        </div>
      </div>
      <div style={{padding:"14px 14px",paddingBottom:90,minHeight:"calc(100vh - 56px)"}}>
        {isAdmin?<>
          {view==="overview"&&<AdminDashboard members={members} sessions={sessions} classes={classes}/>}
          {view==="attend"&&<AdminAttendance sessions={sessions} members={members} onMark={markAtt} onPromoteWL={promoteWL}/>}
          {view==="members"&&<AdminMembers members={members} sessions={sessions} settings={settings} onSaveMember={saveMember} onUnlockDevice={unlockDevice} showToast={showToast}/>}
          {view==="notiflog"&&<AdminNotifLog notifications={notifications} members={members}/>}
          {view==="reports"&&<AdminReports sessions={sessions} members={members} classes={classes} showToast={showToast}/>}
          {view==="settings"&&<AdminSettings settings={settings} onSave={saveSettings} members={members} onUnlockDevice={unlockDevice} showToast={showToast}/>}
        </>:<>
          {view==="schedule"&&<ScheduleView sessions={sessions} member={cur} settings={settings} onBook={book} onWaitlist={joinWL} onCancel={cancel} onCancelWL={cancelWL}/>}
          {view==="myBookings"&&<MyBookingsView sessions={sessions} member={cur} onCancel={cancel} onCancelWL={cancelWL} onCheckin={checkin}/>}
          {view==="checkin"&&<CheckinView sessions={sessions} member={cur} settings={settings} onCheckin={checkin}/>}
          {view==="notifs"&&<NotificationsView notifications={notifications} member={cur} onRead={markNotifRead}/>}
          {view==="profile"&&<ProfileView member={cur} sessions={sessions} settings={settings}/>}
        </>}
      </div>
      <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:440,background:C.surf,borderTop:`1px solid ${C.border}`,padding:"9px 0 18px",display:"flex",justifyContent:"space-around",zIndex:50}}>
        {NAV.map(n=>{ const act=view===n.id; return (
          <button key={n.id} onClick={()=>setView(n.id)} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:3,background:"none",border:"none",cursor:"pointer",minWidth:48,color:act?C.orange:C.muted,position:"relative",fontFamily:FONT}}>
            <div style={{position:"relative"}}>
              <span style={{fontSize:20}}>{n.ic}</span>
              {n.badge>0&&<span style={{position:"absolute",top:-4,right:-8,background:C.red,color:"#fff",fontSize:9,fontWeight:800,minWidth:16,height:16,borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",padding:"0 3px"}}>{n.badge}</span>}
            </div>
            <span style={{fontSize:9,fontWeight:act?800:400}}>{n.lb}</span>
            {act&&<div style={{width:16,height:2,background:C.orange,borderRadius:2}}/>}
          </button>
        );})}
      </div>
    </div>
  );
}


    // ── RENDER ──────────────────────────────────────────
    const container = document.getElementById('root');
    const reactRoot = ReactDOM.createRoot(container);
    reactRoot.render(<App />);

    // ซ่อน loading screen หลัง render
    document.getElementById('loading').style.display = 'none';
  </script>
</body>
</html>
