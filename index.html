  <style>
/* ── Theme CSS Variables (auto-switch via body.apex-dark / body.apex-light) ── */
:root, body.apex-dark {
  --c-bg:      #0A0A10;
  --c-surf:    rgba(16,16,26,0.88);
  --c-surfUp:  rgba(28,28,42,0.92);
  --c-border:  rgba(255,255,255,0.07);
  --c-text:    #F2F2FF;
  --c-sub:     #9898B8;
  --c-muted:   #55557A;
  --c-lineM:   rgba(6,199,85,.16);
}
body.apex-light {
  --c-bg:      #F8FAFC;
  --c-surf:    #FFFFFF;
  --c-surfUp:  #F1F5F9;
  --c-border:  #E2E8F0;
  --c-text:    #1E293B;
  --c-sub:     #475569;
  --c-muted:   #64748B;
  --c-lineM:   rgba(6,199,85,.10);
}

    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body,#root{height:100%;min-height:100%}
    body{font-family:'Prompt','Sarabun',system-ui,sans-serif;-webkit-font-smoothing:antialiased;overflow-x:hidden;overflow-y:auto;transition:background .3s}
    input,button,select,textarea{font-family:inherit}
    ::-webkit-scrollbar{width:4px;height:4px}
    ::-webkit-scrollbar-thumb{background:#3f3f46;border-radius:2px}
    #splash{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;z-index:9999;transition:opacity .5s;background:#09090B}
    #splash.hidden{opacity:0;pointer-events:none}
    #splash img{width:160px;background:transparent;padding:0;border-radius:0}
    #splash .sub { color: #64748B; }
    body.apex-dark #splash .sub { color: #71717A; }
    @keyframes apex-pulse{0%,100%{opacity:1}50%{opacity:.15}}
    #apex-sync-dot{display:none;position:fixed;top:8px;right:8px;z-index:9999;align-items:center;gap:5px;background:rgba(0,0,0,.72);color:#fff;font-size:10px;padding:4px 10px;border-radius:20px;backdrop-filter:blur(6px);font-family:sans-serif;letter-spacing:.3px;}
    #apex-sync-dot span{width:7px;height:7px;border-radius:50%;background:#F97316;display:inline-block;animation:apex-pulse 1s ease-in-out infinite;}

    /* ════ APEX FITNESS — CSS Design System v2 ═══════════════════════ */

    /* ── CSS Custom Properties (Design Tokens) ─────────────────────── */
    :root {
      --apex-orange:      #F97316;
      --apex-orange-d:    #EA580C;
      --apex-orange-glow: rgba(249,115,22,.22);
      --apex-green:       #22C55E;
      --apex-red:         #EF4444;
      --apex-blue:        #3B82F6;
      --apex-purple:      #A855F7;
      --apex-amber:       #F59E0B;
      --apex-font:        'Prompt','Sarabun',system-ui,sans-serif;
      --apex-r:           14px;    /* card radius */
      --apex-r-sm:        9px;     /* button/pill radius */
      --apex-r-lg:        22px;    /* full-round elements */
      --apex-ease:        cubic-bezier(.4,0,.2,1);
      --apex-spring:      cubic-bezier(.34,1.56,.64,1);
      --apex-t:           .18s;    /* base transition duration */
      --apex-shadow-sm:   0 1px 3px rgba(0,0,0,.10),0 1px 2px rgba(0,0,0,.07);
      --apex-shadow:      0 4px 14px rgba(0,0,0,.14),0 1px 4px rgba(0,0,0,.08);
      --apex-shadow-lg:   0 10px 32px rgba(0,0,0,.20),0 4px 10px rgba(0,0,0,.10);
      --apex-shadow-orange: 0 4px 18px rgba(249,115,22,.30);
    }

    /* ── Premium Light Mode (default) ───────────────────────────────── */
    body, body.apex-light {
      --apex-bg:       #F8FAFC;
      --apex-surf:     #FFFFFF;
      --apex-surf-up:  #F4F6F8;
      --apex-border:   #E2E8F0;
      --apex-text:     #1E293B;
      --apex-muted:    #64748B;
      --apex-sub:      #475569;
      --apex-shadow-sm: 0 1px 3px rgba(15,23,42,.06),0 1px 2px rgba(15,23,42,.04);
      --apex-shadow:   0 4px 20px rgba(15,23,42,.08),0 1px 4px rgba(15,23,42,.04);
      --apex-shadow-lg: 0 8px 40px rgba(15,23,42,.10),0 2px 8px rgba(15,23,42,.05);
      --apex-shadow-orange: 0 4px 18px rgba(234,88,12,.28);
    }
    /* ── Dark mode override ─────────────────────────────────────────── */
    body.apex-dark {
      --apex-bg:       #09090B;
      --apex-surf:     #18181B;
      --apex-surf-up:  #1F1F23;
      --apex-border:   #27272A;
      --apex-text:     #FAFAFA;
      --apex-muted:    #71717A;
      --apex-sub:      #A1A1AA;
      --apex-shadow-sm: 0 1px 3px rgba(0,0,0,.18),0 1px 2px rgba(0,0,0,.12);
      --apex-shadow:   0 4px 14px rgba(0,0,0,.22),0 1px 4px rgba(0,0,0,.14);
      --apex-shadow-lg: 0 10px 32px rgba(0,0,0,.28),0 4px 10px rgba(0,0,0,.18);
      --apex-shadow-orange: 0 4px 18px rgba(249,115,22,.30);
    }

    /* ── Base resets ─────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      font-family: var(--apex-font);
      overscroll-behavior-y: contain;
      text-rendering: optimizeLegibility;
    }

    /* ── Touch & Tap improvements (Mobile-first) ─────────────────────── */
    button, input, select, textarea, a {
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    /* ── Selection highlight ─────────────────────────────────────────── */
    ::selection { background: var(--apex-orange-glow); color: var(--apex-orange); }

    /* ── Scrollbar ───────────────────────────────────────────────────── */
    ::-webkit-scrollbar          { width: 3px; height: 3px; }
    ::-webkit-scrollbar-track    { background: transparent; }
    ::-webkit-scrollbar-thumb    { background: var(--apex-border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--apex-muted); }

    /* ── Focus visible (accessibility) ──────────────────────────────── */
    :focus-visible {
      outline: 2px solid var(--apex-orange) !important;
      outline-offset: 2px !important;
    }

    /* ════ BUTTONS ═══════════════════════════════════════════════════ */
    .apex-btn {
      font-family:   var(--apex-font) !important;
      font-weight:   700 !important;
      letter-spacing: 0.01em;
      position:      relative;
      overflow:      hidden;
      transition:    transform var(--apex-t) var(--apex-ease),
                     box-shadow var(--apex-t) var(--apex-ease),
                     opacity var(--apex-t) var(--apex-ease) !important;
    }
    /* Ripple overlay on hover */
    .apex-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: rgba(255,255,255,0);
      transition: background var(--apex-t) var(--apex-ease);
      pointer-events: none;
    }
    .apex-btn:hover:not(:disabled)::after  { background: rgba(255,255,255,.07); }
    .apex-btn:hover:not(:disabled)         { transform: translateY(-1px); box-shadow: var(--apex-shadow); }
    .apex-btn:active:not(:disabled)        { transform: scale(.96) !important; box-shadow: none !important; }
    .apex-btn:disabled                     { cursor: not-allowed !important; }

    /* Orange CTA glow */
    .apex-btn-primary:hover:not(:disabled) { box-shadow: var(--apex-shadow-orange) !important; }

    /* ════ PILLS / BADGES ════════════════════════════════════════════ */
    .apex-pill {
      display:         inline-flex;
      align-items:     center;
      gap:             3px;
      font-size:       11px;
      font-weight:     700;
      letter-spacing:  0.025em;
      white-space:     nowrap;
      transition:      transform var(--apex-t) var(--apex-ease);
    }

    /* ════ CARDS ═════════════════════════════════════════════════════ */
    .apex-card {
      transition: box-shadow var(--apex-t) var(--apex-ease),
                  border-color var(--apex-t) var(--apex-ease) !important;
    }
    .apex-card:hover {
      box-shadow:   var(--apex-shadow) !important;
      border-color: rgba(249,115,22,.25) !important;
    }

    /* ════ SESSION CARDS (Schedule) ══════════════════════════════════ */
    .apex-session-card {
      transition: transform var(--apex-t) var(--apex-ease),
                  box-shadow var(--apex-t) var(--apex-ease),
                  border-color var(--apex-t) var(--apex-ease) !important;
    }
    .apex-session-card:hover {
      transform:   translateY(-2px) !important;
      box-shadow:  var(--apex-shadow) !important;
    }
    .apex-session-card:active { transform: scale(.99) !important; }

    /* ════ DAY STRIP ═════════════════════════════════════════════════ */
    .apex-day-btn {
      transition: transform var(--apex-t) var(--apex-ease),
                  background var(--apex-t) var(--apex-ease),
                  color var(--apex-t) var(--apex-ease),
                  box-shadow var(--apex-t) var(--apex-ease) !important;
    }
    .apex-day-btn:hover  { transform: translateY(-1px) !important; }
    .apex-day-btn:active { transform: scale(.90) !important; }

    /* ════ HEADER ════════════════════════════════════════════════════ */
    .apex-header {
      backdrop-filter: blur(20px) saturate(160%);
      -webkit-backdrop-filter: blur(20px) saturate(160%);
    }

    /* ════ BOTTOM NAV ════════════════════════════════════════════════ */
    .apex-nav {
      backdrop-filter: blur(16px) saturate(180%);
      -webkit-backdrop-filter: blur(16px) saturate(180%);
      box-shadow: 0 -1px 0 rgba(255,255,255,.05), 0 -4px 20px rgba(0,0,0,.14);
    }
    body.apex-light .apex-nav {
      box-shadow: 0 -1px 0 rgba(0,0,0,.07), 0 -4px 16px rgba(0,0,0,.05);
    }
    .apex-nav button {
      transition: color var(--apex-t) var(--apex-ease),
                  transform var(--apex-t) var(--apex-spring) !important;
    }
    .apex-nav button:active { transform: scale(.84) !important; }

    /* ════ TOAST ═════════════════════════════════════════════════════ */
    .apex-toast {
      animation: apex-toast-in .26s var(--apex-spring) !important;
      box-shadow: 0 8px 28px rgba(0,0,0,.28), 0 2px 8px rgba(0,0,0,.16) !important;
      backdrop-filter: blur(10px);
      font-weight: 600 !important;
      letter-spacing: 0.01em;
      max-width: min(88vw, 360px);
    }
    @keyframes apex-toast-in {
      from { opacity:0; transform:translateX(-50%) translateY(-14px) scale(.92); }
      to   { opacity:1; transform:translateX(-50%) translateY(0)      scale(1);  }
    }

    /* ════ INPUTS ════════════════════════════════════════════════════ */
    input:not([type=checkbox]):not([type=radio]),
    select, textarea {
      font-family: var(--apex-font) !important;
      transition:  border-color var(--apex-t) var(--apex-ease),
                   box-shadow   var(--apex-t) var(--apex-ease) !important;
    }
    input:not([type=checkbox]):not([type=radio]):focus,
    select:focus, textarea:focus {
      outline:    none;
      box-shadow: 0 0 0 3px var(--apex-orange-glow) !important;
      border-color: var(--apex-orange) !important;
    }

    /* ════ LOGIN CARD ════════════════════════════════════════════════ */
    .apex-login-card {
      backdrop-filter: blur(14px);
      box-shadow: var(--apex-shadow-lg);
      animation: apex-card-in .38s var(--apex-spring);
    }
    @keyframes apex-card-in {
      from { opacity:0; transform:translateY(18px) scale(.97); }
      to   { opacity:1; transform:translateY(0)    scale(1);   }
    }

    /* ════ SKELETON LOADER ════════════════════════════════════════════ */
    @keyframes apex-shimmer {
      0%   { background-position: -400px 0; }
      100% { background-position:  400px 0; }
    }
    .apex-skeleton {
      background: linear-gradient(90deg,
        var(--apex-surf) 25%,
        var(--apex-surf-up) 50%,
        var(--apex-surf) 75%);
      background-size: 800px 100%;
      animation: apex-shimmer 1.4s ease-in-out infinite;
      border-radius: var(--apex-r-sm);
    }

    /* ════ FADE-UP ANIMATION ══════════════════════════════════════════ */
    @keyframes apex-fade-up {
      from { opacity:0; transform:translateY(8px); }
      to   { opacity:1; transform:translateY(0);   }
    }
    .apex-fade-in { animation: apex-fade-up .28s var(--apex-ease) both; }

    /* ════ THEME TOGGLE ══════════════════════════════════════════════ */
    .apex-theme-toggle {
      transition: transform var(--apex-t) var(--apex-ease),
                  background var(--apex-t) var(--apex-ease) !important;
    }
    .apex-theme-toggle:hover  { transform: scale(1.08) !important; }
    .apex-theme-toggle:active { transform: scale(.92)  !important; }

    /* ════ MOBILE FINE-TUNING ════════════════════════════════════════ */
    @media (hover: none) {
      /* On touch devices: remove hover transforms (they linger) */
      .apex-btn:hover:not(:disabled)        { transform: none; box-shadow: none; }
      .apex-session-card:hover              { transform: none; }
      .apex-day-btn:hover                   { transform: none !important; }
    }
    @media (max-width: 390px) {
      .apex-toast { font-size: 13px !important; }
    }
    #err{display:none;position:fixed;inset:0;background:#09090B;align-items:center;justify-content:center;flex-direction:column;gap:12px;padding:24px;text-align:center}
    #err.show{display:flex}
    #err h2{color:#EF4444;font-size:18px}
    #err p{color:#71717A;font-size:13px;max-width:300px;line-height:1.6}
    #err code{color:#F97316;font-size:11px;font-family:monospace;background:#18181B;padding:8px 12px;border-radius:8px;max-width:320px;overflow:auto;display:block;text-align:left;white-space:pre-wrap;word-break:break-all}
    /* smooth theme transition */
    div,button,input{transition:background-color .2s, border-color .2s, color .2s}
    /* Responsive */
    @media (max-width: 540px) { body { background: #09090B; } }
    @media (min-width: 541px) { 
      body { background: linear-gradient(135deg, #0d0d0f 0%, #1a1a20 100%); }
      #root { min-height: 100vh; display: flex; align-items: flex-start; justify-content: center; padding: 20px 0; }
    }
    @media (min-width: 768px) {
      #root { padding: 40px 0; }
    }
    .tab-scroll::-webkit-scrollbar { display: none }
    .tab-scroll { -ms-overflow-style: none; scrollbar-width: none }
    ::-webkit-scrollbar { width: 4px; height: 4px }
    ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 2px }
    /* ════ Premium Light Mode — Specific Overrides ══════════════════ */

    /* Body background ── แสดงสีทันทีก่อน React load */
    body { background: var(--apex-bg); }

    /* Splash screen light/dark */
    #splash { background: #F8FAFC; }
    body.apex-dark #splash { background: #09090B; }
    #splash .sub { color: #64748B; }
    body.apex-dark #splash .sub { color: #71717A; }

    /* Cards & Session cards — soft shadow in light mode */
    body:not(.apex-dark) .apex-session-card {
      box-shadow: var(--apex-shadow-sm) !important;
      background: #FFFFFF !important;
    }
    body:not(.apex-dark) .apex-session-card:hover {
      box-shadow: var(--apex-shadow) !important;
      border-color: rgba(234,88,12,.18) !important;
      transform: translateY(-2px) !important;
    }
    body:not(.apex-dark) .apex-card {
      box-shadow: var(--apex-shadow-sm) !important;
    }
    body:not(.apex-dark) .apex-card:hover {
      box-shadow: var(--apex-shadow) !important;
      border-color: rgba(234,88,12,.15) !important;
    }

    /* Header — frosted glass premium */
    body:not(.apex-dark) .apex-header {
      background: rgba(248,250,252,.92) !important;
      border-bottom: 1px solid rgba(226,232,240,.9) !important;
      box-shadow: 0 1px 0 rgba(15,23,42,.04) !important;
    }

    /* Bottom nav — frosted glass premium */
    body:not(.apex-dark) .apex-nav {
      background: rgba(255,255,255,.92) !important;
      border-top: 1px solid rgba(226,232,240,.8) !important;
      box-shadow: 0 -1px 0 rgba(15,23,42,.05),0 -4px 20px rgba(15,23,42,.05) !important;
    }

    /* Buttons in light mode */
    body:not(.apex-dark) .apex-btn:hover:not(:disabled) {
      box-shadow: 0 4px 14px rgba(15,23,42,.12) !important;
    }
    body:not(.apex-dark) .apex-btn-primary:hover:not(:disabled) {
      box-shadow: 0 4px 18px rgba(234,88,12,.28) !important;
    }
    /* Disabled button in light mode */
    body:not(.apex-dark) .apex-btn:disabled {
      background: #F1F5F9 !important;
      color: #94A3B8 !important;
      opacity: 1 !important;
    }

    /* Inputs in light mode */
    body:not(.apex-dark) input:not([type=checkbox]):not([type=radio]):focus,
    body:not(.apex-dark) select:focus,
    body:not(.apex-dark) textarea:focus {
      border-color: #EA580C !important;
      box-shadow: 0 0 0 3px rgba(234,88,12,.14) !important;
    }

    /* Toast shadow in light mode */
    body:not(.apex-dark) .apex-toast {
      box-shadow: 0 8px 28px rgba(15,23,42,.16),0 2px 6px rgba(15,23,42,.10) !important;
    }

    /* Scrollbar in light mode */
    body:not(.apex-dark) ::-webkit-scrollbar-thumb { background: #CBD5E1; }
    body:not(.apex-dark) ::-webkit-scrollbar-thumb:hover { background: #94A3B8; }

    /* Old dark scrollbar override */
    body.apex-dark ::-webkit-scrollbar-thumb { background: #3f3f46; }


    /* ── Native Mobile UI ─────────────────────────────────────── */

    /* Bottom nav: iPhone safe-area */
    .apex-nav {
      padding-bottom: max(env(safe-area-inset-bottom), 8px) !important;
    }
    .apex-nav button span svg {
      width: 22px; height: 22px; display: block;
    }

    /* Touch active effects */
    .apex-session-card        { transition: transform .1s ease, opacity .1s ease; }
    .apex-session-card:active { transform: scale(.975); opacity: .88; }
    .apex-btn                 { transition: transform .1s ease, opacity .1s ease; }
    .apex-btn:active          { transform: scale(.93); opacity: .82; }
    .apex-day-btn             { transition: transform .1s ease; }
    .apex-day-btn:active      { transform: scale(.88); }
    .apex-nav button          { transition: opacity .1s ease, transform .1s ease; }
    .apex-nav button:active   { opacity: .55; transform: scale(.85); }

    /* Session card: subtle border in light mode */
    body:not(.apex-dark) .apex-session-card {
      border-color: rgba(0,0,0,.06) !important;
    }

    /* DayStrip: iOS momentum scroll */
    .apex-day-strip {
      -webkit-overflow-scrolling: touch;
      scroll-behavior: smooth;
      -ms-overflow-style: none;
    }
    .apex-day-strip::-webkit-scrollbar { display: none; }

  
    /* ════════════════════════════════════════════════════════════
       PREMIUM DARK FITNESS REDESIGN
       Dark bg + orange neon + glassmorphism
    ═══════════════════════════════════════════════════════════ */

    /* ── Body: ultra dark with orange + purple radial glow ────── */
    body.apex-dark {
      background:
        radial-gradient(ellipse 80% 55% at 18% -8%,  rgba(249,115,22,.09) 0%, transparent 65%),
        radial-gradient(ellipse 65% 45% at 88% 108%, rgba(139,92,246,.07) 0%, transparent 65%),
        #0A0A10 !important;
    }

    /* ── Glassmorphism: session cards ─────────────────────────── */
    body.apex-dark .apex-session-card {
      backdrop-filter:         blur(14px) saturate(160%) !important;
      -webkit-backdrop-filter: blur(14px) saturate(160%) !important;
      background:   rgba(16,16,28,0.82) !important;
      border:       1px solid rgba(255,255,255,0.07) !important;
      box-shadow:
        0 4px 24px rgba(0,0,0,.55),
        0 1px 0   rgba(255,255,255,.05) inset !important;
    }
    body.apex-dark .apex-session-card:hover {
      border-color: rgba(249,115,22,.30) !important;
      box-shadow:
        0 8px 32px rgba(0,0,0,.60),
