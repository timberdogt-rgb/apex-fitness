<html lang="th">
<head>

  <title>Apex Fitness — ระบบจองคลาส</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;600;700;800;900&family=Sarabun:wght@400;600;700&display=swap" rel="stylesheet"/>
  <!-- React 18 เท่านั้น — ไม่ต้องพึ่ง Recharts CDN อีกต่อไป -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body,#root{height:100%;min-height:100%}
    body{background:#09090B;font-family:'Prompt','Sarabun',system-ui,sans-serif;-webkit-font-smoothing:antialiased;overflow-x:hidden}
    input,button,select,textarea{font-family:inherit}
    ::-webkit-scrollbar{width:4px;height:4px}
    ::-webkit-scrollbar-thumb{background:#3f3f46;border-radius:2px}
    #splash{position:fixed;inset:0;background:#09090B;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:9999;transition:opacity .5s ease}
    #splash.hidden{opacity:0;pointer-events:none}
    #splash .ic{font-size:56px;animation:pulse 1.5s ease-in-out infinite}
    #splash .tx{color:#F97316;font-size:16px;font-weight:700;letter-spacing:5px;font-family:'Prompt',sans-serif}
    #splash .sb{color:#71717A;font-size:13px}
    #err{display:none;position:fixed;inset:0;background:#09090B;align-items:center;justify-content:center;flex-direction:column;gap:12px;padding:24px;text-align:center}
    #err.show{display:flex}
    #err h2{color:#EF4444;font-size:18px;font-family:'Prompt',sans-serif}
    #err p{color:#71717A;font-size:13px;max-width:300px;line-height:1.6}
    #err code{color:#F97316;font-size:11px;font-family:monospace;background:#18181B;padding:8px 12px;border-radius:8px;max-width:320px;overflow:auto;display:block;text-align:left;white-space:pre-wrap;word-break:break-all}
    @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
  </style>
</head>
<body>
  <div id="splash">
    <div class="ic">🏋️</div>
    <div class="tx">APEX FITNESS</div>
    <div class="sb">กำลังโหลดระบบ...</div>
  </div>
  <div id="err">
    <div style="font-size:48px">⚠️</div>
    <h2>เกิดข้อผิดพลาด</h2>
    <p>ไม่สามารถโหลดระบบได้ กรุณารีเฟรชหน้าเว็บ หรือติดต่อ Admin</p>
    <code id="err-msg"></code>
    <button onclick="location.reload()" style="margin-top:8px;padding:10px 24px;background:#F97316;border:none;border-radius:10px;color:#fff;font-size:14px;cursor:pointer;font-family:Prompt,sans-serif">รีเฟรชหน้าเว็บ</button>
  </div>
  <div id="root"></div>
  <script>
    window.onerror=function(msg,src,line,col,err){
      document.getElementById('splash').classList.add('hidden');
      document.getElementById('err').classList.add('show');
      document.getElementById('err-msg').textContent=(err?err.toString():msg)+' (line '+line+')';
    };
    window.onunhandledrejection=function(e){
      document.getElementById('splash').classList.add('hidden');
      document.getElementById('err').classList.add('show');
      document.getElementById('err-msg').textContent=e.reason?e.reason.toString():'Promise rejected';
    };
  </script>
