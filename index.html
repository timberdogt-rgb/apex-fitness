<html lang="th">
<head>

  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
  <title>Apex Fitness — ระบบจองคลาส</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;600;700;800;900&family=Sarabun:wght@400;600;700&display=swap" rel="stylesheet"/>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>

  <!-- Firebase SDK (โหลด sync เพื่อให้ OTP ทำงานทันที) -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body,#root{height:100%;min-height:100%}
    body{font-family:'Prompt','Sarabun',system-ui,sans-serif;-webkit-font-smoothing:antialiased;overflow-x:hidden;transition:background .3s}
    input,button,select,textarea{font-family:inherit}
    ::-webkit-scrollbar{width:4px;height:4px}
    ::-webkit-scrollbar-thumb{background:#3f3f46;border-radius:2px}
    #splash{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;z-index:9999;transition:opacity .5s;background:#09090B}
    #splash.hidden{opacity:0;pointer-events:none}
    #splash img{width:160px;background:#fff;padding:16px;border-radius:20px;box-shadow:0 8px 32px rgba(0,0,0,.4)}
    #splash .sub{color:#71717A;font-size:13px}
    #err{display:none;position:fixed;inset:0;background:#09090B;align-items:center;justify-content:center;flex-direction:column;gap:12px;padding:24px;text-align:center}
    #err.show{display:flex}
    #err h2{color:#EF4444;font-size:18px}
    #err p{color:#71717A;font-size:13px;max-width:300px;line-height:1.6}
    #err code{color:#F97316;font-size:11px;font-family:monospace;background:#18181B;padding:8px 12px;border-radius:8px;max-width:320px;overflow:auto;display:block;text-align:left;white-space:pre-wrap;word-break:break-all}
    /* smooth theme transition */
    div,button,input{transition:background-color .2s, border-color .2s, color .2s}
  </style>
</head>
