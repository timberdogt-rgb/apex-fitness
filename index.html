<html lang="th">
<head>

  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
  <title>Apex Fitness — ระบบจองคลาส</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;600;700;800;900&family=Sarabun:wght@400;600;700&display=swap" rel="stylesheet"/>

  <!-- React 18 -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

  <!-- Firebase (สำหรับ SMS OTP ฟรี — ถ้าไม่ใช้ comment ออกได้) -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body,#root{height:100%;min-height:100%}
    body{background:#09090B;font-family:'Prompt','Sarabun',system-ui,sans-serif;-webkit-font-smoothing:antialiased;overflow-x:hidden}
    input,button,select,textarea{font-family:inherit}
    ::-webkit-scrollbar{width:4px;height:4px}
    ::-webkit-scrollbar-thumb{background:#3f3f46;border-radius:2px}
    /* Splash */
    #splash{position:fixed;inset:0;background:#09090B;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:9999;transition:opacity .5s}
    #splash.hidden{opacity:0;pointer-events:none}
    #splash .ic{animation:pulse 1.5s ease-in-out infinite}
    /* Error screen */
    #err{display:none;position:fixed;inset:0;background:#09090B;align-items:center;justify-content:center;flex-direction:column;gap:12px;padding:24px;text-align:center}
    #err.show{display:flex}
    #err h2{color:#EF4444;font-size:18px;font-family:'Prompt',sans-serif}
    #err p{color:#71717A;font-size:13px;max-width:300px;line-height:1.6}
    #err code{color:#F97316;font-size:11px;font-family:monospace;background:#18181B;padding:8px 12px;border-radius:8px;max-width:320px;overflow:auto;display:block;text-align:left;white-space:pre-wrap;word-break:break-all}
    @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
    /* reCAPTCHA invisible */
    #recaptcha-container{position:fixed;bottom:0;right:0;z-index:9999}
  </style>
</head>
